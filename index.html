    // Loads the signet, finds its tight bounding box (the source PNG has lots
    // of transparent padding), crops, and recolors it white via source-in
    // compositing so it reads cleanly on the navy face.
    function loadSignetWhite() {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const w = img.naturalWidth;
          const h = img.naturalHeight;
          // Draw to find alpha bbox
          const probe = document.createElement('canvas');
          probe.width = w; probe.height = h;
          const pctx = probe.getContext('2d');
          pctx.drawImage(img, 0, 0);
          const data = pctx.getImageData(0, 0, w, h).data;
          let minX = w, minY = h, maxX = 0, maxY = 0;
          for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
              if (data[(y * w + x) * 4 + 3] > 8) {
                if (x < minX) minX = x;
                if (y < minY) minY = y;
                if (x > maxX) maxX = x;
                if (y > maxY) maxY = y;
              }
            }
          }
          const bw = maxX - minX + 1;
          const bh = maxY - minY + 1;
          // Make square so aspect is preserved when stamped centered
          const side = Math.max(bw, bh);
          const c = document.createElement('canvas');
          c.width = c.height = side;
          const cx = c.getContext('2d');
          cx.drawImage(
            img,
            minX, minY, bw, bh,
            (side - bw) / 2, (side - bh) / 2, bw, bh
          );
          // Recolor white
          cx.globalCompositeOperation = 'source-in';
          cx.fillStyle = '#FFFFFF';
          cx.fillRect(0, 0, side, side);
          resolve(c);
        };
        img.onerror = reject;
        img.src = SIGNET_DATA_URL;
      });
    }

    // ---------- Face texture ----------
    // Navy disk, subtle striations, hairline rings, signet at center.
    // No arc text, no marks.
    function buildFaceTexture(signetImg, { size = 1024, rotate180 = false } = {}) {
      const cv = document.createElement('canvas');
      cv.width = cv.height = size;
      const ctx = cv.getContext('2d');
      if (rotate180) {
        ctx.translate(size, size);
        ctx.rotate(Math.PI);
      }
      const cx = size / 2, cy = size / 2;
      const R  = size / 2;

      // Navy radial gradient background
      const navyGrad = ctx.createRadialGradient(cx - R * 0.25, cy - R * 0.3, R * 0.05, cx, cy, R);
      navyGrad.addColorStop(0, '#11324f');
      navyGrad.addColorStop(0.55, NAVY);
      navyGrad.addColorStop(1, '#04111e');

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, R - 2, 0, Math.PI * 2);
      ctx.clip();

      ctx.fillStyle = navyGrad;
      ctx.fillRect(0, 0, size, size);

      // Faint radial striations (brand "barcode" echo)
      ctx.globalAlpha = 0.06;
      ctx.strokeStyle = TEAL_LIGHT;
      ctx.lineWidth = 1;
      for (let i = 0; i < 60; i++) {
        const a = (i / 60) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * R * 0.18, cy + Math.sin(a) * R * 0.18);
        ctx.lineTo(cx + Math.cos(a) * R * 0.92, cy + Math.sin(a) * R * 0.92);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // Outer hairline ring
      ctx.strokeStyle = 'rgba(179,221,232,0.45)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, R * 0.94, 0, Math.PI * 2);
      ctx.stroke();

      // Inner concentric rings (define the arc-text band)
      ctx.strokeStyle = 'rgba(3,136,166,0.55)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(cx, cy, R * 0.74, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(3,136,166,0.30)';
      ctx.beginPath();
      ctx.arc(cx, cy, R * 0.88, 0, Math.PI * 2);
      ctx.stroke();

      // ---- Arc text helper ----
      function arcText(text, radius, centerAngle, arcSpan, opts = {}) {
        const {
          size: fs = 44,
          color = TEAL_LIGHT,
          weight = 600,
          flip = false,
        } = opts;
        ctx.save();
        ctx.font = `${weight} ${fs}px "Syne", system-ui, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = color;

        const chars  = text.split('');
        const widths = chars.map(c => ctx.measureText(c).width);
        const totalW = widths.reduce((a, b) => a + b, 0) + (chars.length - 1) * fs * 0.18;
        const span   = Math.min(arcSpan, totalW / radius);
        const dir    = flip ? -1 : 1;

        let acc = 0;
        for (let i = 0; i < chars.length; i++) {
          const w = widths[i];
          const charCenterOffset = acc + w / 2;
          const t = (charCenterOffset / totalW) - 0.5;
          const angle = centerAngle + dir * t * span;
          const x = cx + Math.cos(angle) * radius;
          const y = cy + Math.sin(angle) * radius;
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(angle + (flip ? -Math.PI / 2 : Math.PI / 2));
          ctx.fillText(chars[i], 0, 0);
          ctx.restore();
          acc += w + fs * 0.18;
        }
        ctx.restore();
      }

      // Top arc: TOKENIZED ASSETS
      arcText('TOKENIZED ASSETS', R * 0.81, -Math.PI / 2, Math.PI * 0.85, {
        size: 52, weight: 600, color: TEAL_LIGHT, flip: false,
      });
      // Bottom arc: INVESTMENT ADVISORY
      arcText('INVESTMENT ADVISORY', R * 0.81,  Math.PI / 2, Math.PI * 0.85, {
        size: 48, weight: 600, color: TEAL_LIGHT, flip: true,
      });

      // Small teal dots at 9 and 3 o'clock between the words
      ctx.fillStyle = TEAL;
      [0, Math.PI].forEach(a => {
        ctx.beginPath();
        ctx.arc(cx + Math.cos(a) * R * 0.81, cy + Math.sin(a) * R * 0.81, 6, 0, Math.PI * 2);
        ctx.fill();
      });

      // ---- Signet logo at center ----
      ctx.save();
      ctx.translate(cx, cy);

      // Soft teal glow behind the signet
      const glow = ctx.createRadialGradient(0, 0, R * 0.05, 0, 0, R * 0.55);
      glow.addColorStop(0, 'rgba(3,136,166,0.35)');
      glow.addColorStop(0.6, 'rgba(3,136,166,0.10)');
      glow.addColorStop(1, 'rgba(3,136,166,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(0, 0, R * 0.55, 0, Math.PI * 2);
      ctx.fill();

      // Signet — sized to fill the inner ring
      const sigSize = R * 1.30;
      ctx.drawImage(signetImg, -sigSize / 2, -sigSize / 2, sigSize, sigSize);

      ctx.restore();

      // Bevel highlight (top arc)
      const bevel = ctx.createRadialGradient(cx, cy * 0.4, R * 0.5, cx, cy, R);
      bevel.addColorStop(0, 'rgba(255,255,255,0)');
      bevel.addColorStop(0.85, 'rgba(255,255,255,0)');
      bevel.addColorStop(0.97, 'rgba(255,255,255,0.18)');
      bevel.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = bevel;
      ctx.fillRect(0, 0, size, size);

      ctx.restore();

      const tex = new THREE.CanvasTexture(cv);
      tex.anisotropy = 16;
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.needsUpdate = true;
      return tex;
    }

    // ---------- Scene ----------
    const stage = document.getElementById('stage');
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    stage.appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    // Environment for reflections / glass refraction
    const pmrem = new THREE.PMREMGenerator(renderer);
    const envScene = new RoomEnvironment();
    const envMap = pmrem.fromScene(envScene, 0.04).texture;
    scene.environment = envMap;

    const camera = new THREE.PerspectiveCamera(35, 1, 0.1, 100);
    camera.position.set(0, 0.4, 7);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.rotateSpeed = 0.9;
    controls.enableZoom = false;
    controls.enablePan = false;
    controls.minDistance = 6;
    controls.maxDistance = 6;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.2;
    window.__plControls = controls;
    window.__plCamera = camera;

    // Pause autorotate while user interacts; resume after idle
    let idleTimer;
    const resetIdle = () => {
      controls.autoRotate = false;
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => { controls.autoRotate = true; }, 1800);
    };
    renderer.domElement.addEventListener('pointerdown', resetIdle);
    renderer.domElement.addEventListener('wheel', resetIdle, { passive: true });

    // ---------- Lights ----------
    scene.add(new THREE.AmbientLight(0xffffff, 0.35));

    const key = new THREE.DirectionalLight(0xffffff, 1.6);
    key.position.set(3, 5, 4);
    scene.add(key);

    const rimLight = new THREE.PointLight(0x6fc6e0, 4, 20, 1.8);
    rimLight.position.set(-3, 2, -2);
    scene.add(rimLight);

    const fillLight = new THREE.PointLight(0x4a8db8, 2.2, 18, 1.6);
    fillLight.position.set(2, -3, 2);
    scene.add(fillLight);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x081F34, 0.25));

    // ---------- Coin geometry ----------
    const COIN_RADIUS = 1.6;
    const COIN_DEPTH  = 0.36;
    const BEVEL       = 0.07;

    const faceGeom = new THREE.CircleGeometry(COIN_RADIUS - 0.02, 128);

    function buildSideGeometry() {
      const r = COIN_RADIUS;
      const d = COIN_DEPTH / 2;
      const b = BEVEL;
      const pts = [];
      pts.push(new THREE.Vector2(r - b, d));
      const seg = 12;
      for (let i = 1; i <= seg; i++) {
        const a = (i / seg) * (Math.PI / 2);
        pts.push(new THREE.Vector2(r - b + Math.sin(a) * b, d - b + Math.cos(a) * b));
      }
      pts.push(new THREE.Vector2(r, -d + b));
      for (let i = 0; i <= seg; i++) {
        const a = (i / seg) * (Math.PI / 2);
        pts.push(new THREE.Vector2(r - b + Math.cos(a) * b, -d + b - Math.sin(a) * b));
      }
      const g = new THREE.LatheGeometry(pts, 160);
      g.computeVertexNormals();
      return g;
    }
    const sideGeom = buildSideGeometry();

    // ---------- Materials ----------
    const signetImg = await loadSignetWhite();
    const frontTex  = buildFaceTexture(signetImg, { size: 1024, rotate180: false });
    const backTex   = buildFaceTexture(signetImg, { size: 1024, rotate180: true  });

    function makeFaceMaterial(tex) {
      return new THREE.MeshPhysicalMaterial({
        map: tex,
        emissiveMap: tex,
        emissive: new THREE.Color(0xffffff),
        emissiveIntensity: 0.35,
        metalness: 0.25,
        roughness: 0.32,
        clearcoat: 1.0,
        clearcoatRoughness: 0.10,
        envMapIntensity: 0.9,
        side: THREE.FrontSide,
      });
    }

    // Glass-ish rim — translucent teal with high transmission
    const rimMat = new THREE.MeshPhysicalMaterial({
      color: new THREE.Color('#bfe6f0'),
      metalness: 0.0,
      roughness: 0.05,
      transmission: 0.95,
      thickness: 0.55,
      ior: 1.45,
      attenuationColor: new THREE.Color('#3aa3c4'),
      attenuationDistance: 1.8,
      clearcoat: 1.0,
      clearcoatRoughness: 0.04,
      envMapIntensity: 1.4,
      transparent: true,
      side: THREE.DoubleSide,
    });

    // ---------- Coin group ----------
    const coin = new THREE.Group();

    const side = new THREE.Mesh(sideGeom, rimMat);
    coin.add(side);

    const faceFront = new THREE.Mesh(faceGeom, makeFaceMaterial(frontTex));
    faceFront.position.y =  COIN_DEPTH / 2 + 0.001;
    faceFront.rotation.x = -Math.PI / 2;
    coin.add(faceFront);

    const faceBack = new THREE.Mesh(faceGeom, makeFaceMaterial(backTex));
    faceBack.position.y = -COIN_DEPTH / 2 - 0.001;
    faceBack.rotation.x =  Math.PI / 2;
    coin.add(faceBack);

    // Orient coin standing up, slight 3/4 tilt
    coin.rotation.x = Math.PI / 2;
    coin.rotation.y = -0.25;
    coin.rotation.z = 0.18;

    scene.add(coin);

    // (Ground shadow removed — the coin floats freely so it can sit cleanly
    //  on any host background without an iframe-clipping seam.)

    // ---------- Resize ----------
    function resize() {
      const w = stage.clientWidth;
      const h = stage.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    resize();

    // ---------- Loop ----------
    function tick() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    tick();
  </script>
</body>
</html>
